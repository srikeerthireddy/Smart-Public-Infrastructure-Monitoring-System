services:
  postgres:
    image: postgres:16-alpine
    container_name: spims-postgres
    environment:
      POSTGRES_DB: spims
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d spims']
      interval: 5s
      timeout: 5s
      retries: 10

  backend-service:
    build:
      context: ./backend-service
    container_name: spims-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spims
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: spims
      SIMULATOR_INTERVAL_MS: 10000
      AUTO_SEED: 'true'
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      DEFAULT_OPERATOR_USERNAME: operator
      DEFAULT_OPERATOR_PASSWORD: operator123
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:4200,http://127.0.0.1:4200
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5000/health > /dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  admin-dashboard:
    build:
      context: ./admin-dashboard
    container_name: spims-admin
    depends_on:
      backend-service:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    ports:
      - '3000:3000'

  public-website:
    build:
      context: ./public-website
    container_name: spims-public
    depends_on:
      backend-service:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api
    ports:
      - '3001:3001'

  enterprise-dashboard:
    build:
      context: ./enterprise-dashboard
    container_name: spims-enterprise
    depends_on:
      backend-service:
        condition: service_healthy
    environment:
      PORT: 4200
    ports:
      - '4200:4200'

volumes:
  postgres_data:
